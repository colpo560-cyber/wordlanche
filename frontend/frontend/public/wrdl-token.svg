<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E84142"/>
      <stop offset="100%" style="stop-color:#C0353A"/>
    </linearGradient>
    <radialGradient id="coinHighlight" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="240" fill="url(#coinGradient)" filter="url(#shadow)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#B02E30" stroke-width="8"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
  <circle cx="256" cy="256" r="240" fill="url(#coinHighlight)"/>
  <text x="256" y="270" dominant-baseline="central" text-anchor="middle"
        font-family="Arial Black, sans-serif" font-weight="900" font-size="220"
        fill="white">W</text>
</svg>
